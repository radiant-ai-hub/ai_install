name: Test Installation Scripts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test-windows-full-install:
    runs-on: windows-latest
    name: Test Windows Full Installation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Windows installer
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Write-Host "Running FULL Windows installation test..." -ForegroundColor Cyan
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\windows-install-ai-tools.ps1

      - name: Verify installed commands
        shell: powershell
        run: |
          git --version
          bash --version
          node --version
          npm --version
          gh --version
          uv --version
          python --version
          $pythonCommand = (Get-Command python).Source
          if ($pythonCommand -match 'WindowsApps') {
            throw "python still resolves to the Windows Store alias: $pythonCommand"
          }
          Write-Host $pythonCommand
          $pythonVersion = (python --version | Out-String).Trim()
          if ($pythonVersion -ne 'Python 3.13.12') {
            throw "Expected Python 3.13.12, got '$pythonVersion'."
          }
          $pythonPlatform = (python -c "import sysconfig; print(sysconfig.get_platform())" | Out-String).Trim()
          Write-Host $pythonPlatform
          $codeCommand = @(
            "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd",
            "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.exe",
            "$env:ProgramFiles\Microsoft VS Code\bin\code.cmd",
            "$env:ProgramFiles\Microsoft VS Code\bin\code.exe",
            "${env:ProgramFiles(x86)}\Microsoft VS Code\bin\code.cmd",
            "${env:ProgramFiles(x86)}\Microsoft VS Code\bin\code.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $codeCommand) {
            throw "VS Code CLI was not found after installation."
          }
          & $codeCommand --version
          $settingsPath = Join-Path $env:APPDATA 'Code\User\settings.json'
          $keybindingsPath = Join-Path $env:APPDATA 'Code\User\keybindings.json'
          if (-not (Test-Path $settingsPath)) {
            throw "VS Code settings were not copied."
          }
          if (-not (Test-Path $keybindingsPath)) {
            throw "VS Code keybindings were not copied."
          }
          $settings = Get-Content $settingsPath -Raw | ConvertFrom-Json
          if ($settings.'terminal.integrated.defaultProfile.windows' -ne 'Git Bash') {
            throw "VS Code default Windows terminal is not Git Bash."
          }
          if (-not $settings.'terminal.integrated.profiles.windows'.'Git Bash') {
            throw "VS Code Git Bash terminal profile was not configured."
          }
          $extensions = @((& $codeCommand --list-extensions) | ForEach-Object { $_.Trim().ToLowerInvariant() })
          $copilotExtensions = @($extensions | Where-Object { $_ -like 'github.copilot*' })
          Write-Host ($copilotExtensions -join ', ')
          if ($extensions -notcontains 'ms-python.python') {
            throw "VS Code Python extension was not installed."
          }
          if ($copilotExtensions.Count -eq 0) {
            throw "No GitHub Copilot-related VS Code extensions were installed."
          }
          claude --version
          codex --version

      - name: Test uninstall script
        shell: powershell
        run: |
          $env:CI = "true"
          .\windows-uninstall-ai-tools.ps1

  test-windows-arm-full-install:
    runs-on: windows-11-arm
    name: Test Windows ARM Full Installation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Windows ARM installer
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          Write-Host "Running FULL Windows ARM installation test..." -ForegroundColor Cyan
          Write-Host "Processor architecture: $env:PROCESSOR_ARCHITECTURE" -ForegroundColor Gray
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          .\windows-install-ai-tools.ps1

      - name: Verify installed commands
        shell: powershell
        run: |
          git --version
          bash --version
          node --version
          npm --version
          gh --version
          uv --version
          python --version
          $pythonCommand = (Get-Command python).Source
          if ($pythonCommand -match 'WindowsApps') {
            throw "python still resolves to the Windows Store alias: $pythonCommand"
          }
          Write-Host $pythonCommand
          $pythonVersion = (python --version | Out-String).Trim()
          if ($pythonVersion -ne 'Python 3.13.12') {
            throw "Expected Python 3.13.12, got '$pythonVersion'."
          }
          $pythonPlatform = (python -c "import sysconfig; print(sysconfig.get_platform())" | Out-String).Trim()
          if ($pythonPlatform -notmatch "arm64") {
            throw "Expected a native ARM64 Python on Windows ARM, got '$pythonPlatform'."
          }
          Write-Host $pythonPlatform
          $codeCommand = @(
            "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.cmd",
            "$env:LOCALAPPDATA\Programs\Microsoft VS Code\bin\code.exe",
            "$env:ProgramFiles\Microsoft VS Code\bin\code.cmd",
            "$env:ProgramFiles\Microsoft VS Code\bin\code.exe",
            "${env:ProgramFiles(x86)}\Microsoft VS Code\bin\code.cmd",
            "${env:ProgramFiles(x86)}\Microsoft VS Code\bin\code.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $codeCommand) {
            throw "VS Code CLI was not found after installation."
          }
          & $codeCommand --version
          $settingsPath = Join-Path $env:APPDATA 'Code\User\settings.json'
          $keybindingsPath = Join-Path $env:APPDATA 'Code\User\keybindings.json'
          if (-not (Test-Path $settingsPath)) {
            throw "VS Code settings were not copied."
          }
          if (-not (Test-Path $keybindingsPath)) {
            throw "VS Code keybindings were not copied."
          }
          $settings = Get-Content $settingsPath -Raw | ConvertFrom-Json
          if ($settings.'terminal.integrated.defaultProfile.windows' -ne 'Git Bash') {
            throw "VS Code default Windows terminal is not Git Bash."
          }
          if (-not $settings.'terminal.integrated.profiles.windows'.'Git Bash') {
            throw "VS Code Git Bash terminal profile was not configured."
          }
          $extensions = @((& $codeCommand --list-extensions) | ForEach-Object { $_.Trim().ToLowerInvariant() })
          $copilotExtensions = @($extensions | Where-Object { $_ -like 'github.copilot*' })
          Write-Host ($copilotExtensions -join ', ')
          if ($extensions -notcontains 'ms-python.python') {
            throw "VS Code Python extension was not installed."
          }
          if ($copilotExtensions.Count -eq 0) {
            throw "No GitHub Copilot-related VS Code extensions were installed."
          }
          claude --version
          codex --version

      - name: Test uninstall script
        shell: powershell
        run: |
          $env:CI = "true"
          .\windows-uninstall-ai-tools.ps1

  test-windows:
    runs-on: windows-latest
    name: Test Windows Installer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate PowerShell syntax
        shell: powershell
        run: |
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .\windows-install-ai-tools.ps1 -Raw), [ref]$null)
          $null = [System.Management.Automation.PSParser]::Tokenize((Get-Content .\windows-uninstall-ai-tools.ps1 -Raw), [ref]$null)
          Write-Host "PowerShell syntax checks passed."

      - name: Test script logic
        shell: powershell
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if (-not (Get-Command winget -ErrorAction SilentlyContinue)) {
            throw "winget is required on Windows runners."
          }

          $gitPackage = winget show --exact --id Git.Git --accept-source-agreements | Out-String
          if ($gitPackage -notmatch "Git.Git") {
            throw "Could not resolve Git.Git package information."
          }

          $vscodePackage = winget show --exact --id Microsoft.VisualStudioCode --accept-source-agreements | Out-String
          if ($vscodePackage -notmatch "Microsoft\.VisualStudioCode") {
            throw "Could not resolve Microsoft.VisualStudioCode package information."
          }

          $pythonPackage = winget show --exact --id Python.Python.3.13 --accept-source-agreements | Out-String
          if ($pythonPackage -notmatch "Python\.Python\.3\.13") {
            throw "Could not resolve Python.Python.3.13 package information."
          }

          $release = Invoke-RestMethod -Headers @{ Authorization = "Bearer $env:GITHUB_TOKEN" } -Uri "https://api.github.com/repos/cli/cli/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -match '^gh_.*_windows_amd64\.zip$' } | Select-Object -First 1
          if (-not $asset) {
            throw "Could not resolve the latest GitHub CLI Windows asset."
          }

  test-macos-full-install:
    runs-on: macos-latest
    name: Test macOS Full Installation
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run full macOS installation
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "Running FULL macOS installation test..."
          export CI=true
          chmod +x ./macos-install-ai-tools.sh
          ./macos-install-ai-tools.sh

      - name: Verify installed commands
        run: |
          git --version
          node --version
          npm --version
          gh --version
          uv --version
          python3 --version || python --version
          code --version
          claude --version
          codex --version

      - name: Test uninstall script
        run: |
          export CI=true
          chmod +x ./macos-uninstall-ai-tools.sh
          ./macos-uninstall-ai-tools.sh

  test-macos:
    runs-on: macos-latest
    name: Test macOS Installer
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Test bash script syntax
        run: |
          bash -n ./macos-install-ai-tools.sh
          bash -n ./macos-uninstall-ai-tools.sh

      - name: Test script logic
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          echo "Testing VS Code ARM64 DMG URL..."
          VSCODE_URL='https://code.visualstudio.com/sha/download?build=stable&os=darwin-arm64-dmg'
          test "$(curl -I -L -s -o /dev/null -w '%{http_code}' "$VSCODE_URL")" = "200"

          echo "Testing Node.js latest LTS detection..."
          NODE_VERSION=$(
            curl -s https://nodejs.org/dist/index.json \
              | tr '{' '\n' \
              | grep '"version"' \
              | grep -Ev '"lts":[[:space:]]*false' \
              | sed -E 's/.*"version":[[:space:]]*"([^"]+)".*/\1/' \
              | head -n1
          )
          test -n "$NODE_VERSION"
          echo "$NODE_VERSION"

          echo "Testing GitHub CLI macOS ARM64 asset detection..."
          GH_URL=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" https://api.github.com/repos/cli/cli/releases/latest | grep -o 'https://[^"]*macOS_arm64.zip' | head -n1)
          test -n "$GH_URL"
          echo "$GH_URL"

          echo "Checking required macOS tools..."
          command -v curl
          command -v hdiutil
          command -v sw_vers
